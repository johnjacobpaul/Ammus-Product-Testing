<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ammu's Products</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --logo-bg: #f0ebf5; 
  --magenta: #b81273; 
  --charcoal: #403844; 
  
  --pink: var(--magenta);
  --pink-light: #d63d95;
  --pink-pale: #f9e6f1;
  --pink-border: #f1bddd;
  
  --purple-dark: var(--charcoal);
  --purple-mid: #685972;
  
  --lavender: #f0ebf5; 
  --lavender-mid: #c7b8d8;
  --lavender-dark: var(--charcoal);
  
  --white: #ffffff;
  --offwhite: #fcfbfe;
  
  --text-dark: var(--charcoal);
  --text-mid: #685972;
  --text-muted: #958a9e;
  --border: #e4dcf0;
}
body { background: #e0d5e9; overflow: hidden; }

/* Strictly constrained app bounds to guarantee bottom nav visibility */
.shell{background:var(--lavender);height:100vh;height:100dvh;display:flex;justify-content:center;font-family:'Plus Jakarta Sans',sans-serif;overflow:hidden;}
.phone{width:100%;max-width:420px;display:flex;flex-direction:column;height:100%;background:var(--lavender);position:relative;overflow:hidden;}
.hdr{background:transparent;padding:32px 20px 12px;display:flex;flex-direction:column;align-items:center;z-index:10;position:relative;flex-shrink:0;}
.menu-btn{position:absolute;top:32px;right:20px;width:40px;height:40px;border-radius:12px;background:var(--white);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(64,56,68,.05);cursor:pointer;z-index:100;}
.logo-wrap{width:250px;height:250px;border-radius:24px;background:var(--white);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(64,56,68,.08);overflow:hidden;flex-shrink:0;}
.logo-wrap img{width:100%;height:100%;object-fit:contain;display:block;}

/* Main area scrolls naturally without disturbing the bottom nav */
.main{flex:1;overflow-y:auto;padding:20px 13px 20px;background:var(--lavender);}

.pg-title{font-size:18px;font-weight:800;color:var(--text-dark);margin-bottom:14px;}
.sl{font-size:10px;font-weight:700;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px;}
.abtn{display:flex;align-items:center;gap:13px;width:100%;padding:14px 15px;border-radius:20px;cursor:pointer;text-align:left;font-family:inherit;margin-bottom:10px;border:none;transition:transform .15s;}
.abtn:active{transform:scale(.97);}
.ico{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.at{font-size:14px;font-weight:700;color:var(--text-dark);line-height:1.3;}
.adt{font-size:11px;color:var(--text-muted);margin-top:2px;}
.card{background:var(--white);border-radius:20px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(64,56,68,.04);}
.fl{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;display:block;}
.fi{width:100%;padding:11px 13px;border-radius:12px;border:1.5px solid var(--border);background:var(--white);color:var(--text-dark);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s;}
.fi:focus{border-color:var(--pink);}
.fi:disabled{color:var(--text-muted);background:#fcfbfe;cursor:not-allowed;}
.fi.autofilled{border-color:#16a34a;background:#f0fdf4;color:#166534;}
.fi[type=date]::-webkit-calendar-picker-indicator{opacity:.5;}
.fg{margin-bottom:12px;position:relative;}
.tc{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.pw{display:flex;gap:8px;}
.px{padding:11px 13px;border-radius:12px;border:1.5px solid var(--border);background:var(--pink-pale);color:var(--pink);font-size:13px;font-weight:700;white-space:nowrap;}
.dl{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--white);border:1.5px solid var(--border);border-radius:12px;z-index:50;max-height:150px;overflow-y:auto;box-shadow:0 8px 24px rgba(64,56,68,.14);}
.di{padding:10px 13px;font-size:13px;color:var(--text-dark);cursor:pointer;border-bottom:1px solid var(--lavender);display:flex;justify-content:space-between;align-items:center;}
.di:last-child{border-bottom:none;}
.di:hover{background:var(--pink-pale);}
.match-hint{font-size:11px;color:#16a34a;font-weight:600;margin-top:5px;display:flex;align-items:center;gap:4px;}
.ir{background:#fcfbfe;border-radius:14px;border:1.5px solid var(--border);margin-bottom:10px;overflow:hidden;}
.ir-top{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:1px solid var(--border);}
.ir-num{width:22px;height:22px;border-radius:6px;background:var(--pink);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--white);flex-shrink:0;}
.is{flex:1;padding:8px 10px;border-radius:9px;border:1.5px solid var(--border);background:var(--white);color:var(--text-dark);font-size:13px;font-family:inherit;outline:none;}
.is:focus{border-color:var(--pink);}
.rb{width:26px;height:26px;border-radius:7px;border:1.5px solid #fecaca;background:#fff5f5;color:#ef4444;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;flex-shrink:0;}
.ir-bottom{display:flex;align-items:center;padding:10px 12px;}
.ir-pname{flex:1;font-size:13px;font-weight:700;color:var(--text-dark);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ir-pname.empty{color:var(--text-muted);font-style:italic;font-weight:400;font-size:12px;}
.ir-sep{width:1px;height:18px;background:var(--border);margin:0 10px;flex-shrink:0;}
.ir-qty-group{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.ir-qty-lbl{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;}
.iq{width:42px;padding:6px 5px;border-radius:8px;border:1.5px solid var(--border);background:var(--white);color:var(--text-dark);font-size:13px;font-family:inherit;outline:none;text-align:center;font-weight:700;}
.iq:focus{border-color:var(--pink);}
.ir-price{font-size:14px;font-weight:800;color:var(--pink);min-width:52px;text-align:right;margin-left:10px;}
.ab2{width:100%;padding:11px;border-radius:12px;border:2px dashed var(--lavender-mid);background:transparent;color:var(--text-mid);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:2px;transition:all .2s;}
.ab2:hover{border-color:var(--pink);color:var(--pink);}
.totrow{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-radius:14px;background:var(--pink-pale);border:2px solid var(--pink-border);margin-top:12px;}
.sbtn{width:100%;padding:14px;border-radius:16px;border:none;background:var(--pink);color:var(--white);font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;margin-top:14px;box-shadow:0 4px 16px rgba(184,18,115,.25);}
.sbtn:active{transform:scale(.98);}
.pcrd{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:14px;background:var(--white);margin-bottom:10px;box-shadow:0 2px 6px rgba(64,56,68,.04);}
.pnum{width:24px;height:24px;border-radius:7px;background:var(--pink);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--white);flex-shrink:0;margin-right:12px;}
.bdg{font-size:9px;padding:3px 8px;border-radius:20px;font-weight:700;display:inline-block;margin-top:4px;}
.bs{background:#ede9fe;color:#6d28d9;}.bp{background:#fef9c3;color:#854d0e;}.bx{background:#f9e6f1;color:#b81273;}.bpk{background:#dcfce7;color:#166534;}
.ccrd{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;background:var(--white);margin-bottom:10px;box-shadow:0 2px 6px rgba(64,56,68,.04);}
.cav{width:42px;height:42px;border-radius:12px;background:var(--purple-dark);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:var(--white);flex-shrink:0;}
.sec-header{display:flex;align-items:center;gap:8px;margin:16px 0 10px;}
.sec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sec-title{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;}
.sec-count{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;margin-left:auto;}
.ocrd{background:var(--white);border-radius:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(64,56,68,.04);overflow:hidden;}
.ocrd-head{padding:14px 14px 10px;}
.ocrd-id{font-size:10px;font-weight:800;color:var(--pink);letter-spacing:.04em;}
.ocrd-date{font-size:11px;color:var(--text-muted);font-weight:600;}
.ocrd-name{font-size:15px;font-weight:800;color:var(--text-dark);margin-top:4px;}
.ocrd-meta{font-size:12px;color:var(--text-muted);margin-top:2px;}
.ocrd-items{padding:0 14px 10px;font-size:12px;color:var(--text-mid);line-height:1.7;font-weight:500;}
.ocrd-footer{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid var(--border);flex-wrap:wrap;gap:8px;}
.ocrd-total{font-size:17px;font-weight:800;}
.ocrd-actions{display:flex;gap:5px;flex-wrap:nowrap;margin-top:4px;width:100%;overflow:hidden;}
.oact{padding:5px 7px;border-radius:9px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;border:none;white-space:nowrap;}
.oact:active{opacity:.7;}
.oact-complete{background:#ffedd5;color:#c2410c;}
.oact-pay{background:#dcfce7;color:#166534;}
.oact-invoice{background:var(--lavender);color:var(--text-dark);}
.oact-del{background:#fee2e2;color:#991b1b;margin-left:auto;}
.oact-paid-badge{background:#dcfce7;color:#166534;padding:6px 10px;border-radius:9px;font-size:11px;font-weight:800;}
.modal-overlay{background:rgba(64,56,68,.6);min-height:580px;display:flex;align-items:flex-end;justify-content:center;border-radius:16px;position:relative;z-index:150;}
.modal-sheet{background:var(--white);border-radius:24px 24px 0 0;width:100%;padding:28px 24px 36px;}
.modal-title{font-size:18px;font-weight:800;color:var(--text-dark);margin-bottom:6px;}
.modal-sub{font-size:13px;color:var(--text-muted);margin-bottom:24px;}
.pay-opt{display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:16px;border:2px solid var(--border);cursor:pointer;margin-bottom:12px;transition:all .2s;background:var(--white);}
.pay-opt:hover,.pay-opt.selected{border-color:var(--pink);background:var(--pink-pale);}
.pay-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.pay-label{font-size:16px;font-weight:800;color:var(--text-dark);}
.pay-sub{font-size:12px;color:var(--text-muted);margin-top:2px;}
.modal-confirm{width:100%;padding:15px;border-radius:16px;border:none;background:var(--pink);color:var(--white);font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;margin-top:8px;}
.modal-cancel{width:100%;padding:14px;border-radius:16px;border:1.5px solid var(--border);background:var(--white);color:var(--text-muted);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:10px;}

/* ---- Minimal Invoice CSS ---- */
.inv-page{background:var(--offwhite);padding:0 0 80px;}
.inv-topbar{display:flex;align-items:center;gap:12px;padding:18px 16px 14px;}
.inv-doc{background:var(--white);border-radius:8px;margin:0 14px;padding:20px;border:1px solid #e5e5e5;box-shadow:0 2px 8px rgba(0,0,0,.03);}
.inv-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #e5e5e5;}
.inv-bname{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:14px;color:#333;}
.inv-bsub{font-size:10px;color:#666;margin-top:2px;}
.inv-badge{font-size:16px;font-weight:700;color:#999;letter-spacing:1px;}
.inv-meta{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #e5e5e5;}
.inv-meta-lbl{font-size:9px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.04em;}
.inv-meta-val{font-size:11px;font-weight:600;color:#333;margin-top:2px;}
.inv-cust{margin-bottom:16px;}
.inv-cust-lbl{font-size:9px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}
.inv-cust-name{font-size:12px;font-weight:700;color:#333;}
.inv-cust-mob{font-size:11px;color:#666;margin-top:2px;}
.inv-items-header{display:grid;grid-template-columns:1fr 38px 72px;gap:8px;padding:6px 0;border-bottom:1px solid #333;margin-bottom:6px;}
.inv-col-lbl{font-size:9px;font-weight:700;color:#333;text-transform:uppercase;}
.inv-col-lbl.right{text-align:right;}
.inv-item-row{display:grid;grid-template-columns:1fr 38px 72px;gap:8px;padding:6px 0;border-bottom:1px solid #f0f0f0;align-items:center;}
.inv-item-name{font-size:11px;font-weight:600;color:#333;}
.inv-item-unit{font-size:9px;color:#888;}
.inv-item-qty{font-size:11px;font-weight:600;color:#333;text-align:center;}
.inv-item-total{font-size:11px;font-weight:600;color:#333;text-align:right;}
.inv-total-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0 0 0;margin-top:8px;}
.inv-total-lbl{font-size:10px;font-weight:700;color:#333;text-transform:uppercase;}
.inv-total-amt{font-size:14px;font-weight:800;color:#111;}
.inv-footer{text-align:center;margin-top:20px;font-size:10px;color:#999;}

.share-bar{display:flex;gap:10px;margin:16px 14px 0;}
.share-btn{flex:1;padding:13px;border-radius:14px;border:none;font-size:13px;font-weight:800;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.share-btn:active{opacity:.8;}
.em{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:48px 20px;color:var(--text-muted);text-align:center;}
.et{font-size:18px;font-weight:800;color:var(--text-dark);}
.tk{padding:12px 18px;border-radius:14px;font-size:13px;font-weight:700;text-align:center;margin:0 16px 12px;display:none;position:relative;z-index:250;}
.tk.on{display:block;}.tk.ok{background:#dcfce7;color:#166534;}.tk.er{background:#fee2e2;color:#991b1b;}
.bk{width:36px;height:36px;border-radius:10px;border:1.5px solid var(--border);background:var(--white);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.oid-badge{background:var(--offwhite);border:1.5px solid var(--border);padding:8px 12px;border-radius:10px;font-size:11px;font-weight:800;color:var(--text-dark);letter-spacing:.04em;}

/* Floating Elevated Bottom Navigation */
.bottomnav{margin: 0 16px 24px 16px; background:var(--white);display:flex;z-index:100;padding:6px;border-radius:24px;box-shadow:0 8px 32px rgba(64,56,68,.1); flex-shrink:0;}
.filter-scroll::-webkit-scrollbar{display:none;}
.bnb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:10px 4px;cursor:pointer;border:none;background:transparent;font-family:inherit;transition:all 0.2s;border-radius:18px;}
.bnb .lbl{font-size:10px;font-weight:700;color:var(--text-muted);white-space:nowrap;}
.bnb .ico2{width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
.bnb.on .lbl{color:var(--pink);}
.bnb.on .ico2 svg{stroke:var(--pink);}
.bnb:not(.on) .ico2 svg{stroke:var(--text-muted);}
.bnb.on{background:var(--pink-pale);}

/* Date Range UI */
.dr-wrap { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
.dr-inp { flex: 1; padding: 10px 12px; border-radius: 12px; border: 1.5px solid var(--border); font-family: inherit; font-size: 13px; color: var(--text-dark); background: var(--white); outline: none; }
.dr-inp:focus { border-color: var(--pink); }
.stat-card { background: var(--white); border-radius: 16px; padding: 18px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(64,56,68,.04); }
.stat-lbl { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
.stat-val { font-size: 24px; font-weight: 800; color: var(--text-dark); }
.stat-row { display: flex; justify-content: space-between; margin-top: 14px; padding-top: 14px; border-top: 1px dashed var(--border); }
.stat-col { flex: 1; }

/* Side Menu / Hamburger Setup */
.side-menu {position:absolute;top:0;right:0;width:280px;height:100%;background:var(--white);z-index:200;transition:all 0.3s ease;box-shadow:-8px 0 24px rgba(64,56,68,.1);padding:30px 20px;display:flex;flex-direction:column;gap:12px; transform: translateX(100%); visibility: hidden;}
.side-menu.open {transform: translateX(0); visibility: visible;}
.menu-overlay {position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(64,56,68,.4);z-index:199;display:none;}
.menu-overlay.open {display:block;}
.menu-item {padding:14px 16px;border-radius:12px;font-size:15px;font-weight:700;color:var(--text-dark);background:var(--offwhite);cursor:pointer;border:1px solid var(--border);text-align:left;font-family:inherit; transition:all 0.1s;}
.menu-item:active {background:var(--pink-pale);border-color:var(--pink-border);color:var(--pink);}

/* ── Login Screen ──────────────────────────────────────────── */
.login-screen{position:fixed;inset:0;background:var(--lavender);display:flex;align-items:center;justify-content:center;z-index:9999;font-family:'Plus Jakarta Sans',sans-serif;}
.login-box{width:100%;max-width:360px;padding:0 28px;}
.login-logo{width:160px;height:160px;border-radius:20px;background:var(--white);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(64,56,68,.1);overflow:hidden;margin:0 auto 28px;}
.login-logo img{width:100%;height:100%;object-fit:contain;}
.login-title{font-size:22px;font-weight:800;color:var(--text-dark);text-align:center;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--text-muted);text-align:center;margin-bottom:28px;font-weight:600;}
.login-field{margin-bottom:14px;}
.login-field label{font-size:11px;font-weight:700;color:var(--text-muted);letter-spacing:.06em;text-transform:uppercase;display:block;margin-bottom:6px;}
.login-field input{width:100%;padding:13px 15px;border-radius:14px;border:1.5px solid var(--border);background:var(--white);color:var(--text-dark);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;}
.login-field input:focus{border-color:var(--pink);}
.login-btn{width:100%;padding:15px;border-radius:16px;border:none;background:var(--pink);color:var(--white);font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;margin-top:8px;box-shadow:0 4px 16px rgba(184,18,115,.25);}
.login-btn:active{transform:scale(.98);}
.login-err{background:#fee2e2;color:#991b1b;border-radius:12px;padding:11px 14px;font-size:13px;font-weight:700;text-align:center;margin-bottom:14px;display:none;}
.login-err.on{display:block;}

/* ── PIN Modal ─────────────────────────────────────────────── */
.pin-overlay{position:absolute;inset:0;background:rgba(64,56,68,.65);z-index:300;display:flex;align-items:flex-end;justify-content:center;}
.pin-sheet{background:var(--white);border-radius:24px 24px 0 0;width:100%;padding:28px 24px 40px;}
.pin-title{font-size:18px;font-weight:800;color:var(--text-dark);text-align:center;margin-bottom:6px;}
.pin-sub{font-size:13px;color:var(--text-muted);text-align:center;margin-bottom:24px;font-weight:600;}
.pin-dots{display:flex;justify-content:center;gap:14px;margin-bottom:28px;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);transition:all .2s;}
.pin-dot.filled{background:var(--pink);border-color:var(--pink);}
.pin-dot.err{background:#ef4444;border-color:#ef4444;animation:pinShake .3s ease;}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.pin-key{padding:16px 8px;border-radius:14px;border:1.5px solid var(--border);background:var(--offwhite);font-size:20px;font-weight:800;font-family:inherit;cursor:pointer;color:var(--text-dark);transition:all .15s;}
.pin-key:active{background:var(--pink-pale);border-color:var(--pink-border);color:var(--pink);transform:scale(.95);}
.pin-key.del{background:#fff5f5;border-color:#fecaca;color:#ef4444;font-size:16px;}
.pin-key.cancel{background:var(--lavender);border-color:var(--border);color:var(--text-muted);font-size:13px;font-weight:700;}
@keyframes pinShake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
</style>
</head>
<body>
<!-- ── Login Screen ───────────────────────────────────────────── -->
<div id="login-screen" class="login-screen">
  <div class="login-box">
    <div class="login-logo">

async function loadData(){
  const { data, error } = await sb.from('app_data').select('data').eq('user_id', currentUserId).single();
  if(data && data.data){
    const d = data.data;
    if(d.custs) custs = d.custs;

    if(d.exps)  exps  = d.exps;
    if(d.dcbList) dcbList = d.dcbList;

    if(d.miscBankIncomes) miscBankIncomes = d.miscBankIncomes;
    if(d.expCats){ expCats = d.expCats; ["Variance Reconciliation","Discount","Missing Payments","Grocery & Household"].forEach(c=>{ if(!expCats.includes(c)) expCats.push(c); }); }

  }
}

async function persistData(){
  if(!currentUserId) return;

// ── Export / Import ───────────────────────────────────────────
function exportData(){
  const payload = { version: 1, exportedAt: new Date().toISOString(), custs, ords, exps, dcbList, bankDcbList, miscBankIncomes, expCats, openBals, PR, rateAdjLogs };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ammys_backup_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
  stk('Backup downloaded!', 'ok');
}

function importData(){
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json,application/json';
  input.onchange = async (e) => {
    const file = e.target.files[0]; if(!file) return;
    try {
      const text = await file.text();
      const d = JSON.parse(text);
      if(!d.ords && !d.custs){ stk('Invalid backup file', 'err'); return; }
      if(!confirm('This will REPLACE all current data with the backup. Continue?')) return;
      if(d.custs) custs = d.custs;
      if(d.ords)  ords  = d.ords;
      if(d.exps)  exps  = d.exps;
      if(d.dcbList) dcbList = d.dcbList;
      if(d.bankDcbList) bankDcbList = d.bankDcbList;
      if(d.miscBankIncomes) miscBankIncomes = d.miscBankIncomes;
      if(d.expCats){ expCats = d.expCats; ["Variance Reconciliation","Discount","Missing Payments","Grocery & Household"].forEach(c=>{ if(!expCats.includes(c)) expCats.push(c); }); }
      if(d.openBals) openBals = d.openBals;
      if(d.rateAdjLogs) rateAdjLogs = d.rateAdjLogs;
      if(d.PR && d.PR.length) d.PR.forEach(p=>{ const ex=PR.find(x=>x.id===p.id); if(ex){ if(p.userModified) ex.p=p.p; ex.userModified=p.userModified; } else PR.push(p); });
      await persistData();
      stk('Backup restored successfully!', 'ok');
      sp('Home');
    } catch(err){ stk('Failed to read file: ' + err.message, 'err'); }
  };
  input.click();
}

function saveDcb(){
  if(!dcbForm.amt||isNaN(dcbForm.amt)){stk("Please enter a valid amount","err");return;}
  // Freeze the variance at the moment of saving
  const ob = openBals.cash;
  const obDate = new Date(ob.date); obDate.setHours(0,0,0,0);
  const dcbDate = new Date(dcbForm.date); dcbDate.setHours(23,59,59,999);
  const cashIn  = ords.filter(o=>(o.status==='paid'||o.status==='partial')&&new Date(o.date)>=obDate&&new Date(o.date)<=dcbDate).reduce((s,o)=>s+(o.cashPaid!==undefined?o.cashPaid:(o.payMethod==='cash'?(o.amtPaid||o.total):0)),0);
  const cashOut = exps.filter(e=>e.mode==='cash'&&new Date(e.date)>=obDate&&new Date(e.date)<=dcbDate).reduce((s,e)=>s+e.amt,0);
  const expected = ob.amt + cashIn - cashOut;
  const actual   = parseFloat(dcbForm.amt);
  const variance = actual - expected;
  dcbList.push({...dcbForm, amt:actual, cashIn, cashOut, expected, variance, obAmt:ob.amt, obDate:ob.date});
  dcbList.sort((a,b)=>new Date(a.date)-new Date(b.date));
  if(dcbList.length>30) dcbList = dcbList.slice(-30);
  scheduleSave();
  stk("Cash closing balance saved!","ok");vw="home";render();
}

function selectPayMethod(m){
  payModal.selected=m;
  document.querySelectorAll(".pay-opt").forEach(b=>b.classList.remove("selected"));
  const el=document.getElementById("pay-"+m);if(el)el.classList.add("selected");

function confirmPayment(){
  if(!payModal.selected)return;
  const method=payModal.selected;
  const o=ords.find(x=>x.id===payModal.orderId);
  if(!o) return;
  const entered = parseFloat(payModal.payAmt);
  const remaining = o.total - (o.amtPaid||0);
  if(isNaN(entered)||entered<=0){stk("Enter a valid amount","err");return;}
  if(entered>remaining+0.01){stk("Amount cannot exceed remaining balance ₹"+Math.round(remaining),"err");return;}
  const newAmtPaid = (o.amtPaid||0) + entered;
  // Track per-method amounts
  if(method==='cash') o.cashPaid = (o.cashPaid||0) + entered;
  else                o.gpayPaid = (o.gpayPaid||0) + entered;
  o.payMethod = method; // last method used (for badge display fallback)
  if(Math.abs(newAmtPaid - o.total) < 0.01){
    o.status="paid"; o.payDate=payModal.payDate||tdi(); o.amtPaid=o.total;
    stk("Payment recorded — order fully paid!","ok");
  } else {
    o.status="partial"; o.lastPayDate=payModal.payDate||tdi(); o.amtPaid=newAmtPaid;
    stk("Partial payment of ₹"+Math.round(entered)+" recorded","ok");
  }
  scheduleSave();
  payModal={open:false,orderId:"",selected:"",payDate:"",payAmt:""};render();
}

async function getBase64ImageFromUrl(imageUrl) {
  try {
    const res = await fetch(imageUrl);
    if (res.ok) {
      const blob = await res.blob();
      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.onerror = () => resolve(null);
        reader.readAsDataURL(blob);
      });
    }
  } catch(e) {}
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      try {
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        resolve(canvas.toDataURL('image/png'));
      } catch(e) {resolve(null);}
    };
    img.onerror = () => resolve(null);
    img.src = imageUrl;
  });
}

  doc.text("ITEM", pad+2, y+4);
  doc.text("QTY", W/2 + 10, y+4, {align:"center"});
  doc.text("AMOUNT", W-pad-2, y+4, {align:"right"});

  y += 10;
  doc.setTextColor(30, 30, 30);
  o.items.forEach((it,idx) => {
    const prod = PR.find(x=>x.id===parseInt(it.pid));
    if(!prod) return;
    const lineAmt = (it.adjRate!==undefined?it.adjRate:prod.p) * (parseFloat(it.qty)||0);
    doc.setFont("helvetica","bold");
    doc.setFontSize(8);
    doc.text(prod.n, pad+2, y);
    doc.setFont("helvetica","normal");
    doc.setFontSize(7);
    doc.setTextColor(120, 120, 120);
    const displayRate = it.adjRate!==undefined ? it.adjRate : prod.p;
    doc.text("Rs."+displayRate+"/"+prod.u, pad+2, y+4);
    doc.setTextColor(30, 30, 30);
    doc.setFontSize(8);
    const qtyVal = parseFloat(it.qty)||0;
    const qtyDisplay = (prod.u==='kg' && qtyVal>0 && qtyVal<1) ? (Math.round(qtyVal*1000)+'g') : (String(it.qty)+(prod.u==='kg'?'kg':prod.u));
    doc.text(qtyDisplay, W/2 + 10, y, {align:"center"});
    doc.text("Rs."+Math.round(lineAmt), W-pad-2, y, {align:"right"});
    y += 9;
  });

  doc.setDrawColor(220, 220, 220);
  doc.line(pad, y, W-pad, y);
  y += 4;

  doc.setFont("helvetica","bold");
  doc.setFontSize(8);
  doc.text("TOTAL AMOUNT", pad+2, y+3);
  doc.setFontSize(10);
  doc.text("Rs."+Math.round(o.total), W-pad-2, y+3, {align:"right"});

  y += 8;
  const qrSize = 59; 
  const qrData = await getBase64ImageFromUrl('gpay_qr.png');
  if (qrData) {
    let fmt = 'PNG';
    if (qrData.startsWith('data:image/jpeg') || qrData.startsWith('data:image/jpg')) fmt = 'JPEG';
    else if (qrData.startsWith('data:image/webp')) fmt = 'WEBP';
    doc.addImage(qrData, fmt, W/2 - qrSize/2, y, qrSize, qrSize);
  } else {
    doc.setDrawColor(200,200,200);
    doc.rect(W/2 - qrSize/2, y, qrSize, qrSize);
    doc.setTextColor(150, 150, 150);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(8);
    doc.text("gpay_qr.png", W/2, y + qrSize/2 + 2, {align:"center"});
  }

  y += qrSize + 6;
  doc.setTextColor(150, 150, 150);
  doc.setFontSize(6);
  doc.text("Thank you for your business. — Ammu's Products", W/2, y, {align:"center"});
  return doc;
}

async function shareInvoicePDF(ordId){
  const o=ords.find(x=>x.id===ordId);if(!o||!window.jspdf){stk("PDF not ready","err");return;}
  const doc=await generatePDF(o),invNum="INV-"+o.id.replace("ORD-",""),filename=invNum+".pdf";
  if(navigator.share&&navigator.canShare){
    try{const blob=doc.output("blob"),file=new File([blob],[filename],{type:"application/pdf"});
      if(navigator.canShare({files:[file]})){await navigator.share({files:[file],title:"Invoice "+invNum,text:"Invoice from Ammu's Products"});return;}
    }catch(e){}
  }
  doc.save(filename);stk("Saved as "+filename,"ok");
}

}

function orderSection(title,dotColor,badgeBg,badgeColor,statusKey,totalColor,list){
  let filtered=list.filter(o=>o.status===statusKey);
  if(statusKey==="outstanding") filtered=filtered.slice().sort((a,b)=>new Date(a.date)-new Date(b.date));
  return`<div class="sec-header"><div class="sec-dot" style="background:${dotColor};"></div>
    <span class="sec-title" style="color:${dotColor};">${title}</span>
    <span class="sec-count" style="background:${badgeBg};color:${badgeColor};">${filtered.length}</span></div>
  ${filtered.length===0?`<div style="background:#fff;border-radius:14px;padding:14px;text-align:center;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:12px;">No orders here</div>`
  :filtered.map(o=>{
    const lines=o.items.map(it=>{const p=PR.find(x=>x.id===parseInt(it.pid));return p?`${p.n} × ${it.qty}${p.u}`:""}).filter(Boolean).join(" · ");
    const amtPaid = o.amtPaid||0;
    const remaining = o.total - amtPaid;
    return`<div class="ocrd">
      <div class="ocrd-head">
        <div style="display:flex;justify-content:space-between;"><span class="ocrd-id">${o.id}</span><span class="ocrd-date">${o.date}</span></div>
        <div class="ocrd-name">${o.name}</div><div class="ocrd-meta">+91 ${o.mob} · Deliver: ${o.dd}</div>
      </div>
      <div class="ocrd-items">${lines}</div>
      <div class="ocrd-footer">
        <div>
          <span class="ocrd-total" style="color:${totalColor};">₹${Math.round(o.total)}</span>
          ${statusKey==="partial"?`<div style="font-size:11px;font-weight:700;color:#f97316;margin-top:2px;">Paid ₹${Math.round(amtPaid)} · Due ₹${Math.round(remaining)}</div>`:''}
        </div>
        <div class="ocrd-actions">
          ${statusKey==="outstanding"?`<button class="oact oact-complete" onclick="markComplete('${o.id}')">✓ Complete</button>`:""}
          ${statusKey==="outstanding"||statusKey==="completed"||statusKey==="partial"?`<button class="oact" style="background:#e0f2fe;color:#0369a1;" onclick="editOrder('${o.id}')">✏️ Edit</button>`:""}
          ${statusKey==="completed"||statusKey==="partial"?`<button class="oact oact-pay" onclick="openPayModal('${o.id}')">💳 Pay</button>`:""}
          ${statusKey==="paid"||statusKey==="partial"?`<span class="oact-paid-badge">${(()=>{
            const parts=[];
            if(o.cashPaid>0) parts.push('Cash ₹'+Math.round(o.cashPaid));
            if(o.gpayPaid>0) parts.push('GPay ₹'+Math.round(o.gpayPaid));
            if(!parts.length) parts.push(o.payMethod==='gpay'?'GPay':'Cash');
            return '✓ '+parts.join(' + ');
          })()}${o.payDate?' · '+fdate(o.payDate):''}</span>`:""}
          <button class="oact oact-invoice" onclick="openInvoice('${o.id}')">🧾 Invoice</button>
          <button class="oact oact-del" onclick="deleteOrder('${o.id}')">🗑️ Delete</button>
        </div>
      </div>
    </div>`;
  }).join("")}`;
}

              <div class="stat-row" style="background:var(--offwhite); margin:-18px; margin-top:14px; padding:18px; border-radius:0 0 16px 16px;">
                <div class="stat-col"><div class="stat-lbl">DCB Submitted (${fdate(latest.date)})</div><div class="stat-val">₹${Math.round(actual)}</div></div>
                <div class="stat-col" style="text-align:right;"><div class="stat-lbl">Variance</div><div class="stat-val" style="color:${v>=0?'#16a34a':'#dc2626'};">${v>=0?'+':''}₹${Math.round(v)}</div></div>
              </div>
            </div>
            ${v !== 0 ? `<button class="sbtn" style="margin-top:24px; background:var(--charcoal);" onclick="logVariance(${expected}, ${actual}, 'cash')">Reconcile Variance</button>` : ''}
          </div>`;
        }
      }
    } else if(vw==="var_bank"){
      if(!bankDcbList.length){
        el.innerHTML=`<div class="main">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;">
            <div class="bk" onclick="vw='home';render()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#403844" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></div>
            <div><div style="font-size:17px;font-weight:800;color:var(--text-dark);">Bank Variance</div></div>
          </div>
          <div class="em"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/></svg>
            <div class="et">No Bank DCB entry yet</div>
            <div style="font-size:13px;font-weight:500;">Submit a Bank Closing Balance first</div>
            <button class="sbtn" style="margin-top:16px;background:#2563eb;" onclick="openBankDcbForm()">Submit Bank DCB</button>
          </div>
          <div style="margin-top:16px;">
            <button class="sbtn" style="background:#2563eb;" onclick="miscIncomeInline.show=!miscIncomeInline.show;miscIncomeInline.date=miscIncomeInline.date||'${tdi()}';rc();">
              ${miscIncomeInline.show ? '✕ Cancel' : '+ Add Miscellaneous Income'}
            </button>
            ${miscIncomeInline.show ? `
            <div class="card" style="margin-top:12px;">
              <div class="fg"><label class="fl">Date</label>
                <input type="date" class="fi" value="${miscIncomeInline.date||tdi()}" onchange="miscIncomeInline.date=this.value"/>
              </div>
              <div class="fg"><label class="fl">Amount (₹)</label>
                <input type="number" class="fi" placeholder="0" value="${miscIncomeInline.amt}" oninput="miscIncomeInline.amt=this.value"/>
              </div>
              <button class="sbtn" style="margin-top:4px;" onclick="saveMiscBankInline()">Save Income</button>
            </div>` : ''}
          </div>
        </div>`;
      } else {
        const latest = bankDcbList[bankDcbList.length-1];
        const bankIn  = latest.bankIn;
        const miscIn  = latest.miscIn;
        const bankOut = latest.bankOut;
        const expected= latest.expected;
        const actual  = latest.amt;
        const v       = latest.variance;
        const obAmt   = latest.obAmt;
        const obDate  = latest.obDate;
        el.innerHTML=`<div class="main">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;">
            <div class="bk" onclick="vw='home';render()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#403844" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></div>
            <div><div style="font-size:17px;font-weight:800;color:var(--text-dark);">Bank Variance</div>
              <div style="font-size:12px;color:var(--text-muted);font-weight:600;">Snapshot as at ${fdate(latest.date)}</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-row" style="border-top:none;margin-top:0;padding-top:0;">
              <div class="stat-col"><div class="stat-lbl">Opening Balance (${fdate(obDate)})</div><div class="stat-val">₹${Math.round(obAmt)}</div></div>
            </div>
            <div class="stat-row">
              <div class="stat-col"><div class="stat-lbl">GPay Inflow</div><div class="stat-val" style="color:#16a34a;">+ ₹${Math.round(bankIn)}</div></div>
              <div class="stat-col" style="text-align:right;"><div class="stat-lbl">Misc Bank In</div><div class="stat-val" style="color:#16a34a;">+ ₹${Math.round(miscIn)}</div></div>
            </div>
            <div class="stat-row">
              <div class="stat-col"><div class="stat-lbl">GPay Outflow</div><div class="stat-val" style="color:#dc2626;">- ₹${Math.round(bankOut)}</div></div>
              <div class="stat-col" style="text-align:right;"><div class="stat-lbl">Expected Balance</div><div class="stat-val">₹${Math.round(expected)}</div></div>
            </div>
            <div class="stat-row" style="background:var(--offwhite); margin:-18px; margin-top:14px; padding:18px; border-radius:0 0 16px 16px;">
              <div class="stat-col"><div class="stat-lbl">Bank DCB Submitted (${fdate(latest.date)})</div><div class="stat-val">₹${Math.round(actual)}</div></div>
              <div class="stat-col" style="text-align:right;"><div class="stat-lbl">Variance</div><div class="stat-val" style="color:${v>=0?'#16a34a':'#dc2626'};">${v>=0?'+':''}₹${Math.round(v)}</div></div>
            </div>
          </div>
          ${v !== 0 ? `<button class="sbtn" style="margin-top:16px; background:var(--charcoal);" onclick="logVariance(${expected}, ${actual}, 'gpay')">Reconcile Variance</button>` : ''}
          <div style="margin-top:16px;">
            <button class="sbtn" style="background:#2563eb;" onclick="miscIncomeInline.show=!miscIncomeInline.show;miscIncomeInline.date=miscIncomeInline.date||'${tdi()}';rc();">
              ${miscIncomeInline.show ? '✕ Cancel' : '+ Add Miscellaneous Income'}
            </button>
            ${miscIncomeInline.show ? `
            <div class="card" style="margin-top:12px;">
              <div class="fg"><label class="fl">Date</label>
                <input type="date" class="fi" value="${miscIncomeInline.date||tdi()}" onchange="miscIncomeInline.date=this.value"/>
              </div>
              <div class="fg"><label class="fl">Amount (₹)</label>
                <input type="number" class="fi" placeholder="0" value="${miscIncomeInline.amt}" oninput="miscIncomeInline.amt=this.value"/>
              </div>
              <button class="sbtn" style="margin-top:4px;" onclick="saveMiscBankInline()">Save Income</button>
            </div>` : ''}
          </div>
        </div>`;
      }
    }
  } else if(pg==="Expenses"){
    const expStart = (typeof expFilterStart!=='undefined'&&expFilterStart) ? expFilterStart : getStartOfMonth();
    const expEnd   = (typeof expFilterEnd!=='undefined'&&expFilterEnd)     ? expFilterEnd   : tdi();
    let es = new Date(expStart); es.setHours(0,0,0,0);
    let ee = new Date(expEnd);   ee.setHours(23,59,59,999);
    const filteredExps = exps.filter(e=>{ const d=new Date(e.date); return d>=es&&d<=ee; });
    // Build category totals for bar chart
    const catTotals = {};
    filteredExps.forEach(e=>{ catTotals[e.cat]=(catTotals[e.cat]||0)+e.amt; });
    const catEntries = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
    const maxVal = catEntries.length ? catEntries[0][1] : 1;
    const barColors = ['#b81273','#6d28d9','#2563eb','#16a34a','#ca8a04','#dc2626','#0891b2','#7c3aed','#c2410c','#065f46'];
    const chartHTML = catEntries.length===0 ? '' : `
      <div class="card" style="margin-bottom:14px;">
        <div style="font-size:13px;font-weight:800;color:var(--text-dark);margin-bottom:14px;">Spend by Category</div>
        ${catEntries.map(([cat,val],i)=>`
          <div style="margin-bottom:10px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
              <span style="font-size:11px;font-weight:700;color:var(--text-dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70%;">${cat}</span>
              <span style="font-size:11px;font-weight:800;color:${barColors[i%barColors.length]};">₹${Math.round(val)}</span>
            </div>
            <div style="background:var(--border);border-radius:99px;height:8px;overflow:hidden;">
              <div style="height:8px;border-radius:99px;background:${barColors[i%barColors.length]};width:${Math.round((val/maxVal)*100)}%;transition:width .4s;"></div>
            </div>
          </div>`).join("")}
        <div style="border-top:1px dashed var(--border);margin-top:12px;padding-top:10px;display:flex;justify-content:space-between;">
          <span style="font-size:12px;font-weight:800;color:var(--text-dark);">Total</span>
          <span style="font-size:13px;font-weight:800;color:var(--pink);">₹${Math.round(filteredExps.reduce((s,e)=>s+e.amt,0))}</span>
        </div>
      </div>`;
    el.innerHTML=`<div class="main"><div class="pg-title">Expenses Log</div>
      <div class="dr-wrap">
        <input type="date" class="dr-inp" value="${expStart}" onchange="expFilterStart=this.value;rc()" />
        <span style="font-size:12px;color:var(--text-muted);font-weight:700;">to</span>
        <input type="date" class="dr-inp" value="${expEnd}" onchange="expFilterEnd=this.value;rc()" />
      </div>
      ${chartHTML}
      ${filteredExps.length===0
        ?`<div class="em"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01"/><path d="M18 12h.01"/></svg><div class="et">No expenses in range</div><div style="font-size:13px;font-weight:500;">Try adjusting the date range</div></div>`
        :filteredExps.slice().reverse().map(e=>`<div class="ocrd" style="padding:14px;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;">
            <div>
              <div style="font-size:15px;font-weight:800;color:var(--text-dark);">${e.cat}</div>
              <div style="font-size:12px;color:var(--text-muted);margin-top:2px;font-weight:600;">${fdate(e.date)} · ${e.mode.toUpperCase()}</div>
            </div>
            <div style="text-align:right;">
              <div style="font-size:16px;font-weight:800;color:var(--pink);">₹${e.amt}</div>
              <button style="margin-top:6px;background:#fee2e2;color:#991b1b;border:none;padding:5px 10px;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer;" onclick="deleteExpense('${e.id}')">Delete</button>
            </div>
          </div>
        </div>`).join("")}
    </div>`;
  } else if(pg==="Customers"){
    el.innerHTML=`<div class="main"><div class="pg-title">Customers</div>
      <div class="sl">${custs.length} customer${custs.length!==1?"s":""} registered</div>
      ${custs.length===0?`<div class="em"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><div class="et">No customers yet</div><div style="font-size:13px;font-weight:500;">Auto-saved when you enter an order</div></div>`
      :custs.map(c=>`<div class="ccrd"><div class="cav">${c.name[0]}</div>
        <div><div style="font-size:14px;font-weight:800;color:var(--text-dark);">${c.name}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:2px;font-weight:600;">+91 ${c.mob}</div></div>
        <div style="margin-left:auto;font-size:11px;padding:3px 10px;border-radius:20px;background:var(--pink-pale);color:var(--pink);border:1.5px solid var(--pink-border);font-weight:800;">${c.cnt} order${c.cnt!==1?"s":""}</div>
      </div>`).join("")}</div>`;
  } else if(pg==="Rate Adjustment Logs"){
    el.innerHTML=`<div class="main">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;">
        <div class="bk" onclick="sp('Home')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#403844" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></div>
        <div><div style="font-size:17px;font-weight:800;color:var(--text-dark);">Rate Adjustment Logs</div></div>
      </div>
      ${rateAdjLogs.length===0
        ?`<div class="em"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg><div class="et">No adjustments yet</div><div style="font-size:13px;font-weight:500;">Rate adjustments made during orders will appear here</div></div>`
        :rateAdjLogs.slice().reverse().map(log=>`
          <div class="ocrd" style="padding:14px;">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;">
              <div style="flex:1;">
                <div style="font-size:13px;font-weight:800;color:var(--text-dark);">${log.prodName}</div>
                <div style="font-size:11px;color:var(--text-muted);font-weight:600;margin-top:2px;">${fdate(log.date)} · ${log.orderId}</div>
              </div>
              <div style="text-align:right;flex-shrink:0;">
                <div style="font-size:12px;font-weight:700;color:#dc2626;text-decoration:line-through;">₹${log.oldRate}</div>
                <div style="font-size:14px;font-weight:800;color:#f97316;">₹${log.newRate}</div>
              </div>
            </div>
            <div style="margin-top:8px;font-size:11px;font-weight:700;color:var(--text-muted);background:var(--lavender);border-radius:8px;padding:6px 10px;">
              Rate adjusted from ₹${log.oldRate} to ₹${log.newRate}
            </div>
          </div>`).join("")}
    </div>`;
  } else if(pg==="Export / Import Data"){
    el.innerHTML=`<div class="main">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;">
        <div class="bk" onclick="sp('Home')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#403844" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></div>
        <div><div style="font-size:17px;font-weight:800;color:var(--text-dark);">Export / Import Data</div></div>
      </div>
      <div class="card" style="margin-bottom:12px;">
        <div style="font-size:14px;font-weight:800;color:var(--text-dark);margin-bottom:6px;">📤 Export Backup</div>
        <div style="font-size:12px;color:var(--text-muted);font-weight:600;margin-bottom:14px;">Download all app data as a JSON file. Store it safely as a backup.</div>
        <button class="sbtn" style="margin-top:0;" onclick="exportData()">Download Backup JSON</button>
      </div>
      <div class="card">
        <div style="font-size:14px;font-weight:800;color:var(--text-dark);margin-bottom:6px;">📥 Import Backup</div>
        <div style="font-size:12px;color:var(--text-muted);font-weight:600;margin-bottom:14px;">Restore from a previously exported JSON file. <strong style="color:#dc2626;">This will overwrite all current data.</strong></div>
        <button class="sbtn" style="margin-top:0;background:var(--charcoal);" onclick="importData()">Choose Backup File</button>
      </div>
    </div>`;
  } else if(pg==="Reset App"){
    el.innerHTML=`<div class="main">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;">
        <div class="bk" onclick="sp('Home')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#403844" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></div>
        <div><div style="font-size:17px;font-weight:800;color:var(--text-dark);">Reset App</div></div>
      </div>
      <div class="card" style="border:2px solid #fecaca;">
        <div style="font-size:14px;font-weight:800;color:#dc2626;margin-bottom:6px;">⚠️ Danger Zone</div>
        <div style="font-size:12px;color:var(--text-muted);font-weight:600;margin-bottom:14px;">This will permanently delete ALL orders, expenses, customers, and balances from the database. This <strong>cannot be undone.</strong> Export a backup first if needed.</div>
        <button class="sbtn" style="margin-top:0;background:#dc2626;box-shadow:0 4px 16px rgba(220,38,38,.25);" onclick="confirmReset()">Reset All Data</button>
      </div>
    </div>`;
  } else {
    el.innerHTML=`<div class="main">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:18px;">
        <div class="bk" onclick="sp('Home')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#403844" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></div>
        <div><div style="font-size:17px;font-weight:800;color:var(--text-dark);">${pg}</div></div>
      </div>
      <div class="em">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 9h6M9 13h4"/></svg>
      <div class="et">Coming Soon</div><div style="font-size:13px;font-weight:500;">This module is under construction.</div>
    </div></div>`;
  }
}
function render(){
  if(!isLoggedIn) return;
  rn();rc();
  const lw=document.querySelector('.logo-wrap');
  const hdr=document.querySelector('.hdr');
  if(pg==="Home"&&vw==="home"){
    if(lw)lw.style.display="flex";
    if(hdr)hdr.style.paddingBottom="12px";
  }else{
    if(lw)lw.style.display="none";
    if(hdr)hdr.style.paddingBottom="40px";
  }
}

async function confirmReset(){
  if(!confirm('Are you absolutely sure? ALL orders, expenses, customers and balances will be permanently deleted.')) return;
  custs=[]; ords=[]; exps=[]; dcbList=[]; bankDcbList=[]; miscBankIncomes=[];
  expCats=["Labour - Annamma","Labour - Sheeba","Labour - Leela","Labour - Jancy","Utilities - Gas","Utilities - Elec","Personal","Raw Materials","Variance Reconciliation","Discount","Missing Payments","Grocery & Household"];
  openBals={cash:{date:tdi(),amt:0},bank:{date:tdi(),amt:0}};
  expFilterStart=getStartOfMonth(); expFilterEnd=tdi();
  await persistData();
  stk('App has been reset','ok');
  sp('Home');
}
</script>
</body>
</html>
